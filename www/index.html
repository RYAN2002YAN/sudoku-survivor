<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku Survivor</title>
  <style>
    /* ============================================================
       RESET & BASE
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #cbd5e1;
      font-family: 'Courier New', 'SF Mono', 'Fira Code', monospace;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; overflow: hidden;
      user-select: none; -webkit-user-select: none;
    }

    /* ============================================================
       GAME WRAPPER — glass morphism card
       ============================================================ */
    #game-wrapper {
      display: flex; flex-direction: column; gap: 12px; padding: 16px;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 12px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(148, 163, 184, 0.05);
    }

    /* ============================================================
       TOP BAR
       ============================================================ */
    #top-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 16px; font-size: 14px; gap: 16px;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 8px;
    }
    #top-bar .stat { display: flex; align-items: center; gap: 6px; }
    #top-bar .stat-label { color: #94a3b8; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
    #top-bar .stat-value { color: #f8fafc; font-weight: bold; font-size: 16px; }

    #lives-display { color: #ef4444; font-size: 18px; letter-spacing: 2px; }
    #score-display { color: #f59e0b; }
    #level-display { color: #10b981; }
    #timer-display { color: #3b82f6; }

    /* ============================================================
       MAIN GAME AREA
       ============================================================ */
    #game-main { display: flex; gap: 20px; align-items: flex-start; }

    /* ---- Dungeon Panel ---- */
    #dungeon-panel { flex: 0 0 auto; position: relative; }

    #game-canvas {
      display: block;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 8px;
      image-rendering: pixelated; image-rendering: crisp-edges;
    }

    /* ---- Sudoku Panel — glass card ---- */
    #sudoku-panel {
      flex: 0 0 auto; display: flex; flex-direction: column; align-items: center;
      gap: 12px; padding: 14px; min-width: 300px;
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 10px;
    }
    #sudoku-panel h3 { font-size: 13px; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; margin: 0; }

    /* Sudoku grid table */
    #sudoku-grid { border-collapse: collapse; border: 2px solid rgba(148, 163, 184, 0.5); }
    #sudoku-grid td {
      width: 44px; height: 44px; text-align: center; vertical-align: middle;
      font-size: 22px; font-weight: bold; cursor: pointer;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(30, 41, 59, 0.5); color: #cbd5e1;
      transition: background 0.12s, border-color 0.12s;
    }
    #sudoku-grid.grid-9 td { width: 34px; height: 34px; font-size: 16px; }
    #sudoku-grid td:hover { background: rgba(59, 130, 246, 0.15); }

    /* Given (pre-filled) numbers */
    #sudoku-grid td.given { color: #f1f5f9; cursor: default; background: rgba(15, 23, 42, 0.4); }

    /* Selected cell */
    #sudoku-grid td.selected {
      background: rgba(59, 130, 246, 0.25);
      border-color: rgba(96, 165, 250, 0.6);
      box-shadow: inset 0 0 12px rgba(59, 130, 246, 0.2);
    }

    /* Wrong answer flash */
    #sudoku-grid td.wrong-flash { animation: wrongShake 0.4s ease; background: rgba(239, 68, 68, 0.2); border-color: #f87171; color: #f87171; }

    /* Correct answer flash */
    #sudoku-grid td.correct-flash { animation: correctPulse 0.4s ease; background: rgba(16, 185, 129, 0.2); border-color: #10b981; }

    /* Thick box borders */
    #sudoku-grid tr.box-border-bottom td { border-bottom: 1px solid rgba(148, 163, 184, 0.5); }
    #sudoku-grid td.box-border-right { border-right: 1px solid rgba(148, 163, 184, 0.5); }

    @keyframes wrongShake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-4px)} 40%{transform:translateX(4px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)}
    }
    @keyframes correctPulse { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

    /* Number pad */
    #number-pad { display: flex; gap: 6px; }
    .num-btn {
      width: 42px; height: 42px; font-size: 18px; font-weight: bold; font-family: inherit;
      background: rgba(51, 65, 85, 0.6); color: #cbd5e1;
      border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 6px; cursor: pointer;
      transition: all 0.12s;
    }
    .num-btn:hover { background: rgba(71, 85, 105, 0.7); color: #f1f5f9; border-color: rgba(148, 163, 184, 0.4); }
    .num-btn:active { transform: scale(0.93); background: rgba(30, 41, 59, 0.8); }

    /* Sudoku stats */
    #sudoku-status { display: flex; gap: 16px; font-size: 12px; color: #64748b; }
    #sudoku-status .done { color: #10b981; }

    /* ============================================================
       OVERLAYS
       ============================================================ */
    #overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      border-radius: 8px; z-index: 10;
    }
    #overlay.hidden { display: none; }

    #overlay h1 { font-size: 28px; color: #f8fafc; margin-bottom: 8px; letter-spacing: 2px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
    #overlay h2 { font-size: 22px; margin-bottom: 12px; letter-spacing: 1px; }
    #overlay .subtitle { font-size: 13px; color: #94a3b8; margin-bottom: 20px; text-align: center; line-height: 1.6; }
    #overlay .key-hint { font-size: 16px; color: #10b981; animation: blink 1.2s ease-in-out infinite; }

    /* ============================================================
       DIFFICULTY & BUTTONS
       ============================================================ */
    .difficulty-selector { display: flex; gap: 8px; margin: 10px 0; }
    .difficulty-btn {
      padding: 6px 14px; font-size: 13px; font-family: inherit;
      background: rgba(51, 65, 85, 0.4); color: #94a3b8;
      border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 6px;
      cursor: pointer; transition: all 0.15s;
    }
    .difficulty-btn:hover { background: rgba(71, 85, 105, 0.6); color: #e2e8f0; border-color: rgba(148, 163, 184, 0.4); }
    .difficulty-btn.active {
      background: rgba(59, 130, 246, 0.2); border-color: rgba(96, 165, 250, 0.5);
      color: #93c5fd; font-weight: bold;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Overlay state colors */
    #overlay.gameover h2 { color: #ef4444; }
    #overlay.levelclear h2 { color: #10b981; }

    /* ============================================================
       EFFECT LOG
       ============================================================ */
    #effect-log { font-size: 11px; color: #94a3b8; text-align: center; min-height: 18px; transition: color 0.2s; }
    #effect-log.ice { color: #7dd3fc; }
    #effect-log.lightning { color: #fcd34d; }
    #effect-log.freeze { color: #67e8f9; }
    #effect-log.boost { color: #f87171; }

    /* ============================================================
       VIRTUAL D-PAD
       ============================================================ */
    #touch-controls { display: none; position: absolute; bottom: 8px; left: 8px; z-index: 5; }
    #touch-controls .dpad-btn {
      position: absolute; width: 52px; height: 52px;
      background: rgba(51, 65, 85, 0.5); border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 8px; color: rgba(203, 213, 225, 0.6); font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    #touch-controls .dpad-btn:active { background: rgba(71, 85, 105, 0.7); color: #f1f5f9; }
    #dpad-up    { top: 0;    left: 56px; }
    #dpad-down  { top: 108px; left: 56px; }
    #dpad-left  { top: 54px; left: 0;    }
    #dpad-right { top: 54px; left: 112px; }

    /* Mute & Lang buttons */
    #mute-btn, #lang-btn {
      background: none; border: 1px solid rgba(148, 163, 184, 0.2);
      color: #94a3b8; font-size: 14px; cursor: pointer;
      padding: 4px 8px; border-radius: 6px; font-family: inherit;
      transition: all 0.12s;
    }
    #mute-btn:hover, #lang-btn:hover { color: #e2e8f0; border-color: rgba(148, 163, 184, 0.4); }
    #mute-btn.muted { color: #ef4444; border-color: rgba(239, 68, 68, 0.4); }

    /* ============================================================
       NEW MENU SYSTEM — layered progressive design
       ============================================================ */
    .menu-stage { display: none; flex-direction: column; align-items: center; }
    .menu-stage.active { display: flex; }

    /* Animations */
    @keyframes titleEntrance {
      0% { opacity: 0; transform: translateY(-100px) scale(0.8); }
      60% { transform: translateY(10px) scale(1.05); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes slideInRight {
      0% { opacity: 0; transform: translateX(50px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes floatNum {
      0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
      20% { opacity: 0.06; }
      80% { opacity: 0.06; }
      100% { transform: translateY(-400px) translateX(30px) rotate(15deg); opacity: 0; }
    }
    @keyframes fadeOutScale {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.9); }
    }

    /* ---- Floating numbers background ---- */
    .floating-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; pointer-events: none; z-index: 0; }
    .floating-num {
      position: absolute; bottom: -40px;
      font-size: 32px; color: #3b82f6; opacity: 0;
      animation: floatNum 12s linear infinite;
      font-family: monospace; font-weight: bold;
    }

    /* ---- Menu Title Area ---- */
    .menu-title-main {
      font-size: 72px; font-weight: 900; color: #f8fafc;
      text-shadow: 0 0 40px rgba(59, 130, 246, 0.5);
      animation: titleEntrance 1s cubic-bezier(0.34, 1.56, 0.64, 1);
      margin: 0; line-height: 1.1;
    }
    .menu-title-sub {
      font-size: 24px; font-weight: 400; color: #64748b;
      letter-spacing: 8px; margin-top: 16px;
      animation: fadeInUp 0.6s 0.2s both ease;
    }
    .menu-title-desc {
      font-size: 16px; color: #94a3b8; margin-top: 32px;
      animation: fadeInUp 0.6s 0.3s both ease;
    }

    /* ---- Mode Select Buttons ---- */
    .menu-section-title {
      font-size: 20px; font-weight: 600; color: #cbd5e1;
      margin-bottom: 24px; animation: slideInRight 0.4s ease;
    }
    .mode-btns { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }

    .mode-btn {
      width: 280px; height: 120px; border: none; border-radius: 16px;
      cursor: pointer; transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: inherit; position: relative; overflow: hidden;
    }
    .mode-btn-6 {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
    }
    .mode-btn-9 {
      background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
      box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
    }
    .mode-btn:hover { transform: scale(1.05); }
    .mode-btn-6:hover { box-shadow: 0 12px 32px rgba(59, 130, 246, 0.55); }
    .mode-btn-9:hover { box-shadow: 0 12px 32px rgba(139, 92, 246, 0.55); }
    .mode-btn:active { transform: scale(0.95); }
    .mode-btn .mode-icon { font-size: 32px; margin-bottom: 4px; }
    .mode-btn .mode-label { font-size: 24px; font-weight: 700; color: #fff; }
    .mode-btn .mode-sub { font-size: 14px; color: rgba(255,255,255,0.8); margin-top: 4px; }

    /* ---- Difficulty Buttons ---- */
    .diff-btns { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .diff-btn {
      width: 160px; height: 100px; border: 3px solid transparent; border-radius: 12px;
      cursor: pointer; transition: all 0.2s ease;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: inherit; color: #fff; position: relative;
    }
    .diff-btn .diff-icon { font-size: 28px; margin-bottom: 2px; }
    .diff-btn .diff-label { font-size: 18px; font-weight: 600; }
    .diff-btn .diff-sub { font-size: 12px; opacity: 0.8; margin-top: 2px; }
    .diff-btn:hover { transform: translateY(-4px); }
    .diff-btn.selected { border-color: #fff; transform: scale(1.05); }

    .diff-easy { background: #10b981; box-shadow: 0 4px 16px rgba(16,185,129,0.3); }
    .diff-easy:hover { box-shadow: 0 8px 24px rgba(16,185,129,0.45); }
    .diff-medium { background: #3b82f6; box-shadow: 0 4px 16px rgba(59,130,246,0.3); }
    .diff-medium:hover { box-shadow: 0 8px 24px rgba(59,130,246,0.45); }
    .diff-hard { background: #f59e0b; box-shadow: 0 4px 16px rgba(245,158,11,0.3); }
    .diff-hard:hover { box-shadow: 0 8px 24px rgba(245,158,11,0.45); }
    .diff-extreme { background: #ef4444; box-shadow: 0 4px 16px rgba(239,68,68,0.3); }
    .diff-extreme:hover { box-shadow: 0 8px 24px rgba(239,68,68,0.45); }

    /* ---- Start Button ---- */
    .start-btn {
      width: 320px; height: 80px; border: none; border-radius: 16px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: #fff; font-size: 28px; font-weight: 800; font-family: inherit;
      cursor: pointer; box-shadow: 0 12px 32px rgba(16, 185, 129, 0.4);
      transition: all 0.2s ease; animation: pulse 2s infinite;
    }
    .start-btn:hover { transform: scale(1.08); box-shadow: 0 16px 40px rgba(16,185,129,0.5); }
    .start-btn:active { transform: scale(0.9); }
    .start-key-hint { font-size: 14px; color: #64748b; margin-top: 16px; }

    /* ---- Bottom settings ---- */
    .menu-bottom { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .menu-bottom-btn {
      min-width: 120px; height: 40px; padding: 0 14px;
      background: rgba(148, 163, 184, 0.1); border: 1px solid rgba(148,163,184,0.15);
      border-radius: 8px; color: #94a3b8; font-size: 13px; font-family: inherit;
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .menu-bottom-btn:hover { background: rgba(148,163,184,0.2); color: #e2e8f0; }

    /* ---- ============================================================
       RESPONSIVE: Mobile
       ============================================================ */
    @media (max-width: 750px) {
      body { align-items: flex-start; padding: 4px; }
      #game-wrapper { padding: 8px; gap: 8px; width: 100%; max-width: 400px; }
      #top-bar { font-size: 12px; gap: 8px; padding: 6px 10px; }
      #top-bar .stat-value { font-size: 13px; }
      #top-bar .stat-label { font-size: 9px; }
      #game-main { flex-direction: column; gap: 10px; align-items: center; }
      #dungeon-panel { width: 100%; max-width: 352px; }
      #game-canvas { width: 100%; height: auto; }
      #sudoku-grid td { width: 40px; height: 40px; font-size: 18px; }
      .num-btn { width: 38px; height: 38px; font-size: 16px; }
      #sudoku-panel { min-width: unset; width: 100%; max-width: 352px; }
      #touch-controls { display: block; }
      #overlay h1 { font-size: 20px; }
      #overlay h2 { font-size: 18px; }
      #overlay .subtitle { font-size: 11px; margin-bottom: 14px; }
      #overlay .key-hint { font-size: 13px; }
      /* New menu mobile */
      .menu-title-main { font-size: 42px !important; }
      .menu-title-sub { font-size: 16px !important; letter-spacing: 4px !important; }
      .menu-title-desc { font-size: 13px !important; margin-top: 20px !important; }
      .mode-btn { width: 140px; height: 90px; }
      .mode-btn .mode-label { font-size: 18px; }
      .mode-btn .mode-sub { font-size: 11px; }
      .diff-btn { width: 70px; height: 80px; }
      .diff-btn .diff-label { font-size: 14px; }
      .start-btn { width: 260px; height: 64px; font-size: 22px; }
      .menu-bottom-btn { min-width: 90px; height: 36px; font-size: 11px; }
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <!-- Top bar -->
    <header id="top-bar">
      <div class="stat">
        <span class="stat-label" data-i18n="stat.lives">生命</span>
        <span id="lives-display">♥♥♥</span>
      </div>
      <div class="stat">
        <span class="stat-label" data-i18n="stat.score">分数</span>
        <span id="score-display" class="stat-value">0</span>
      </div>
      <div class="stat">
        <span class="stat-label" data-i18n="stat.level">关卡</span>
        <span id="level-display" class="stat-value">1</span>
      </div>
      <div class="stat">
        <span class="stat-label" data-i18n="stat.time">时间</span>
        <span id="timer-display" class="stat-value">0:00</span>
      </div>
      <button id="mute-btn" data-i18n-title="mute.title" title="切换音效">🔊</button>
      <button id="lang-btn" data-i18n-title="lang.title" title="切换语言">🌐</button>
    </header>

    <!-- Main game area -->
    <main id="game-main">
      <!-- Dungeon canvas panel -->
      <div id="dungeon-panel">
        <canvas id="game-canvas" width="352" height="352"></canvas>
        <!-- Virtual D-pad for touch devices -->
        <div id="touch-controls">
          <button class="dpad-btn" id="dpad-up"   data-dir="up">▲</button>
          <button class="dpad-btn" id="dpad-down" data-dir="down">▼</button>
          <button class="dpad-btn" id="dpad-left" data-dir="left">◀</button>
          <button class="dpad-btn" id="dpad-right" data-dir="right">▶</button>
        </div>
        <div id="overlay" class="">
          <h1 data-i18n="menu.title">数独<br>逃生</h1>
          <div class="subtitle" data-i18n="menu.subtitle">一边躲避地牢怪物<br>一边解开 6×6 数独。<br><br><b>完成一行</b> → 身后生成冰墙<br><b>完成一列</b> → 眩晕最近怪物<br><b>完成一宫</b> → 冻结全部怪物<br><b style="color:#ff4757;">填入错误</b> → 怪物加速！</div>
          <div class="key-hint" data-i18n="menu.start">按 空格键 开始</div>
        </div>
      </div>

      <!-- Sudoku panel -->
      <div id="sudoku-panel">
        <h3 data-i18n="sudoku.label">🔢 数独</h3>
        <table id="sudoku-grid">
          <!-- Dynamically generated -->
        </table>
        <div id="number-pad">
          <button class="num-btn" data-value="1">1</button>
          <button class="num-btn" data-value="2">2</button>
          <button class="num-btn" data-value="3">3</button>
          <button class="num-btn" data-value="4">4</button>
          <button class="num-btn" data-value="5">5</button>
          <button class="num-btn" data-value="6">6</button>
        </div>
        <div id="sudoku-status">
          <span><span data-i18n="sudoku.rows">行</span> <span id="rows-done">0</span>/6</span>
          <span><span data-i18n="sudoku.cols">列</span> <span id="cols-done">0</span>/6</span>
          <span><span data-i18n="sudoku.boxes">宫</span> <span id="boxes-done">0</span>/6</span>
        </div>
        <div id="effect-log"></div>
      </div>
    </main>
  </div>

  <!-- Game constants (shared across all scripts) -->
  <script>
    const TILE_SIZE = 32;
    const MAP_ROWS = 11;
    const MAP_COLS = 11;
    const FIXED_TIMESTEP = 1 / 30; // 30 Hz game update
    const MAX_FRAME_TIME = 1 / 10;  // Prevent spiral of death
  </script>

  <!-- Game scripts -->
  <script src="sudoku.js"></script>
  <script src="monsters.js"></script>
  <script src="sound.js"></script>
  <script src="bgm.js"></script>
  <script src="i18n.js"></script>
  <script src="items.js"></script>
  <script src="game.js"></script>
</body>
</html>
